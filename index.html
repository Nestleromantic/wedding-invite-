<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman & Elmira | Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f8f6f3; 
            color: #2c2c2c; 
            font-family: 'Montserrat', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Эстетичный контейнер */
        .wrapper { max-width: 600px; margin: 0 auto; padding: 60px 20px; text-align: center; }

        /* Типографика */
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px; color: #1a1a1a; }
        .date { font-size: 1.2rem; letter-spacing: 0.3rem; text-transform: uppercase; margin-bottom: 40px; color: #8c7851; }
        
        .divider { width: 50px; height: 1px; background: #8c7851; margin: 30px auto; }

        /* Карточка с эффектом */
        .card { 
            background: #fff; 
            padding: 50px 30px; 
            border: 1px solid #eee;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            transition: transform 0.6s ease;
        }

        /* Кнопка с вайбом */
        button { 
            background: #1a1a1a; 
            color: #fff; 
            padding: 18px 40px; 
            border: none; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-top: 30px;
        }

        /* Плавное появление */
        .fade-in { animation: fadeIn 2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="wrapper fade-in">
        <div class="card">
            <h1 id="title">Roman & Elmira</h1>
            <p class="date">26.06.2026</p>
            
            <p id="desc">Мы будем счастливы видеть вас на нашем главном торжестве.</p>
            
            <div class="divider"></div>
            
            <form id="rsvp-form">
                <input type="text" placeholder="Ваше имя" required style="width: 100%; padding: 15px; border: 1px solid #ddd; margin-bottom: 10px;">
                <button type="submit">Подтвердить присутствие</button>
            </form>
        </div>
    </div>

    <script>
        // Добавляем эффект параллакса или интерактивности
        document.querySelector('.card').addEventListener('mousemove', (e) => {
            const { x, y } = e;
            // Можно добавить легкий поворот карточки для глубины
        });

        document.getElementById('rsvp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Спасибо! Мы ждем вас.');
        });
    </script>
</body>
</html>
